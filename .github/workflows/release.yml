name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: stable
  XCADDY_VERSION: latest
  FORWARDPROXY_REF: 'github.com/caddyserver/forwardproxy@caddy2=github.com/klzgrad/forwardproxy@naive'

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@${{ env.XCADDY_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          FORWARDPROXY_REF: ${{ env.FORWARDPROXY_REF }}
        run: |
          mkdir -p dist
          if [ "$GOARCH" = "arm" ]; then
            export GOARM=7
          fi
          xcaddy build --with "$FORWARDPROXY_REF" \
            --output dist/caddy-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Generate checksum
        run: |
          cd dist
          sha256sum caddy-${{ matrix.goos }}-${{ matrix.goarch }} \
            > caddy-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
